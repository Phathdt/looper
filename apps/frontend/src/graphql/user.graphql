query User($id: ID!) {
  user(id: $id) {
    id
    name
    email
    followersCount
    isFollowing
    posts(first: 20) {
      id
      content
      createdAt
      likesCount
      isLiked
    }
  }
}

mutation Follow($userId: ID!) {
  follow(userId: $userId)
}

mutation Unfollow($userId: ID!) {
  unfollow(userId: $userId)
}
