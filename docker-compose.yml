services:
  postgres:
    image: postgres:16-alpine
    container_name: looper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: looper
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d looper']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: looper-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/looper
      JWT_SECRET: change-me-in-prod
      NODE_ENV: production
      PORT: '4000'
      LOG_LEVEL: info
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:4000/graphql?query=%7Bhealth%7D']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_GRAPHQL_ENDPOINT: /graphql
    container_name: looper-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  postgres_data:
